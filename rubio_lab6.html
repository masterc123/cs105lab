<body>

<br>
 <input type="text" id="name" name="name" placeholder="Product" required>
 <input type="number" id="price" name="price" placeholder="Price" required>
 <input type="number" id="stock" name="stock" placeholder="Stock" required>
  <button onclick="additem()">Add Item</button>
 <br>
  <h1>Product:</h1>
  <div id="table"></div>

</body>
<script>

function additem(){
   var table = document.getElementById("table");
   var Product = document.getElementById("name");
   var Price = document.getElementById("price");
   var Stock = document.getElementById("stock");
   if (Product.value != "" && Price.value != "" && Stock.value != "") {
   
             if (Stock.value <= 0) {
       	  		 
                table.innerHTML += `<pre>${Product.value}          ${Price.value}          <font color="red">Out of Stock</font></pre>`;
             } else {
                table.innerHTML += `<pre>${Product.value}          ${Price.value}          ${Stock.value}</pre>`;
               
             }
   }

}

function prefillitem(Product,Price,Stock){
   var table = document.getElementById("table");

             if (Stock <= 0) {
       	  		 
                table.innerHTML += `<pre>${Product}          ${Price}          <font color="red">Out of Stock</font></pre>`;
             } else {
                table.innerHTML += `<pre>${Product}          ${Price}          ${Stock}</pre>`;
             }
   

}
prefillitem("Product","4","45")
prefillitem("Chocolate","41","45")
</script>
